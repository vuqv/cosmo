[OPTIONS]
md_steps = 5000 # number of steps (short, for a demo)
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
; hps_kr is the model that carries nucleic-acid (RNA) parameters, so it is the
; right choice for a mixed protein + RNA system.
model = hps_kr

; temperature coupling
tcoupl = yes
ref_t = 310 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no
pbc = no

; input: a single PDB holding BOTH the protein and the RNA chains
pdb_file = combined.pdb
; output: traj/complex.*
output_dir = traj
outname = complex
device = CPU
ppn = 1
restart = no
minimize = yes
