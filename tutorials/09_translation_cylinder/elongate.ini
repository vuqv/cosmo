[OPTIONS]
# Co-translational synthesis through an ANALYTIC exit tunnel (tutorial 09).
#
# Replaces the explicit ribosome beads of tutorials 07/08 with a cylindrical bore
# drilled through an infinite wall (a "hole in an infinite wall"; see PLAN.md). The
# System is the nascent chain only -- fast, no bead clashes/jamming -- and the
# analytic tunnel confines the in-tunnel segment so the chain stays extended and
# threads out the exit instead of collapsing into a globule at the PTC (the 07/08
# failure mode).
#
# Run from this folder (analytic tunnel -> NOT the cosmo-elongate CLI):
#   python cylinder.py -f elongate.ini

# --- inputs (paths relative to the working directory) ---
pdb_file   = asyn.pdb        # full native PDB of the nascent chain
# NOTE: no `ribosome` PDB -- the tunnel is analytic (geometry from the params below).

# --- elongation schedule ---
L0         = 1               # starting nascent-chain length (cold-start layout)
L_max      =                 # final length (blank -> full residue count)
model      = hps_urry        # nascent-chain force field
n_steps    = 2_000           # integration steps per residue

# --- mechanics ---
restraint_k = 83680          # C-terminus -> PTC restraint (kJ/mol/nm^2)
minimize    = yes

# --- integrator ---
dt         = 0.01
ref_t      = 300
tau_t      = 0.01
nstout     = 50

# --- analytic exit tunnel (PLAN.md §4 defaults) ---
ribosome_model     = cylinder   # this script only runs the analytic 'cylinder' tunnel
tunnel_radius      = 0.9        # bore radius r (nm); ~3 CG beads wide
tunnel_length      = 10.0       # bore length (nm); x_exit = x_lo + length = 10.0
tunnel_x_lo        = 0.0        # PTC / closed end (nm); C-terminus seeded on-axis here
tunnel_center      = 0.0, 0.0   # tunnel axis (y0, z0) (nm); axis = X-axis
tunnel_k           = 8368       # wall stiffness (kJ/mol/nm^2 = 20 kcal/mol/A^2)
tunnel_mouth_round = 0.2        # mouth-corner fillet radius rho (nm)

# --- post-elongation (after the chain reaches full length) ---
# 'ejection' releases the C-terminus restraint so the finished protein diffuses out
# the tunnel exit (the bore + closed PTC end stay on, so the only way out is +x);
# 'stallation' keeps it threaded. Written to <outdir>/<phase>/. Use a LONG run so
# the protein has time to actually clear the tunnel.
post_elongation       = ejection
post_elongation_steps = 300_000   # 0 -> skip

# --- hardware / output ---
device     = GPU
ppn        = 2
outdir     = synth_out
