[OPTIONS]
# ---- proof-of-concept cylinder run: synthesis through an analytic exit tunnel ----
# No explicit ribosome beads -- a bore of radius r in an infinite wall confines the
# nascent chain. Per-codon kinetics from a demo mRNA + the E. coli 310 K codon-time
# table from the shared library. One MD segment per residue.
pdb_file = asyn.pdb
model    = hps_kr
L0       = 5
L_max    = 10
outdir   = synth_out_cyl

# integrator / hardware
device   = CPU
ppn      = 1
dt       = 0.01
ref_t    = 300
tau_t    = 0.01
nstout   = 20
minimize = yes

# O'Brien kinetics: per-codon (mrna given; codon_times = E. coli 310 K table).
# max_steps_per_stage clamps each residue's dwell to a test size.
mrna         = mrna.txt
codon_times  = ../../assets/csp/codon_dwell_times/ecoli/ecoli_codon_dwell_times_310K.txt
scale_factor = 4331293
random_seed  = 1
max_steps_per_stage = 60
min_steps_per_stage = 30

# analytic tunnel geometry (nm)
tunnel_radius      = 0.9
tunnel_length      = 10.0
tunnel_x_lo        = 0.0
tunnel_center      = 0.0,0.0
tunnel_k           = 8368
tunnel_mouth_round = 0.2

# Post-synthesis free runs (both drop the C-terminus tether). 'ejection' releases
# the restraint so the finished chain diffuses out the tunnel exit, then
# 'dissociation' continues it as a second free run. Set either to 0 to skip.
ejection_steps     = 40
dissociation_steps = 40
