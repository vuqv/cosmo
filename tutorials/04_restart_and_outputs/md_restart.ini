[OPTIONS]
; Continue the run started by md.ini. md_steps is the TOTAL target step count;
; the runner loads traj/asyn.chk, sees 2000 steps are already done, and runs the
; remaining 4000 - 2000 = 2000 steps, APPENDING to traj/asyn.dcd and traj/asyn.log.
md_steps = 4000
dt = 0.01 ; ps
nstxout = 100
nstlog = 100
nstcomm = 100
model = hps_urry

tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no
pbc = no

; SAME output_dir + outname as md.ini, so the restart finds traj/asyn.chk
pdb_file = asyn.pdb
output_dir = traj
outname = asyn
device = CPU
ppn = 1
; restart = yes also forces minimize off (coordinates come from the checkpoint)
restart = yes
minimize = no
