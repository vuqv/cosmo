[OPTIONS]
; Continue the run started by md.ini. md_steps is the TOTAL target step count;
; the runner loads asyn.chk, sees 2000 steps are already done, and runs the
; remaining 4000 - 2000 = 2000 steps, APPENDING to asyn.dcd and asyn.log.
md_steps = 4000
dt = 0.01 ; ps
nstxout = 100
nstlog = 100
nstcomm = 100
model = hps_urry

tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no
pbc = no

; SAME protein_code + checkpoint as md.ini, so the restart finds asyn.chk
protein_code = asyn
pdb_file = asyn.pdb
checkpoint = asyn.chk
device = CPU
ppn = 1
; restart = yes also forces minimize off (coordinates come from the checkpoint)
restart = yes
minimize = no
