[OPTIONS]
md_steps = 2000 # first leg: run 2000 steps, then we continue from the checkpoint
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
log_precision = 4 ; decimal places for float columns in the .log
log_width = 14 ; min column width for the aligned, fixed-width .log
model = hps_urry

tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no
pbc = no

; input
pdb_file = asyn.pdb
; output: all files go to traj/asyn.* (traj/asyn.dcd / .log / .chk / .psf /
; asyn_init.pdb / asyn_final.pdb)
output_dir = traj
outname = asyn
; hardware
device = CPU
ppn = 1
; restart / minimize
restart = no
minimize = yes
