[OPTIONS]
md_steps = 2000 # first leg: run 2000 steps, then we continue from the checkpoint
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
model = hps_urry

tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no
pbc = no

; input
protein_code = asyn
pdb_file = asyn.pdb
; output (asyn.dcd / asyn.log / asyn.chk / asyn.psf / asyn_init.pdb / asyn_final.pdb)
checkpoint = asyn.chk
; hardware
device = CPU
ppn = 1
; restart / minimize
restart = no
minimize = yes
