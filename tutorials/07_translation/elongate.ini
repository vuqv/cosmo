[OPTIONS]
# Co-translational synthesis (elongation) — build step v1: nascent chain only,
# no ribosome forces. Grows the nascent chain N->C one residue per step,
# restraining the current C-terminus to the ribosome P-anchor.
#
# Run from this folder:
#   cosmo-elongate -f elongate.ini
#   python -m cosmo.translation -f elongate.ini

# --- inputs (paths relative to the working directory) ---
pdb_file   = asyn.pdb                                                      # full native PDB of the nascent chain
ribosome   = ../../cosmo/translation/structures/4v9d_50S_PtR_5jte_AtR_model_cg_trunc.pdb  # source of the P-/A-anchors

# --- elongation schedule ---
L0         = 5            # starting nascent-chain length (cold-start layout)
L_max      =            # final length (blank -> full residue count)
model      = hps_urry     # nascent-chain force field: hps_urry | hps_kr | hps_ss | mpipi
n_steps    = 1_000         # integration steps per residue (constant schedule)

# --- mechanics ---
restraint_k = 83680       # C-terminus -> P-anchor restraint (kJ/mol/nm^2 = 200 kcal/mol/A^2)
buffer      = 0.4         # new-residue placement offset beyond the A-anchor (nm)
ptc_offset  =            # hold C-terminus this far (+x) from the P-anchor (nm; blank -> auto: 0 in v1, 0.4 in v2)
minimize    = yes         # per-step energy minimization (relaxes the placement)

# --- build step v2: rigid ribosome (uncomment to turn on) ---
rigid_ribosome      = yes    # append the truncated ribosome as mass-0 scenery + ribosome<->nascent forces
rna_model           = topo   # ribosome RNA representation: topo (3/4-bead P/R/BR) | cosmo (1 bead/nucleotide)
nascent_only_output = yes    # write only the nascent chain to traj/psf/final (the ribosome is static)
trna_tether         = yes    # hold C-terminus via O'Brien tRNA tether (bond + orienting angle) vs. position restraint
tunnel_wall         = yes    # one-sided planar wall keeping nascent beads at x >= tunnel_wall_x0 (forward extrusion)
tunnel_wall_x0      =        # wall plane (nm); LEAVE BLANK -> auto = P-anchor x + tether bond length (the PTC / C-terminal-AA addition plane). Only set to override.
tunnel_wall_k       = 8368   # wall force constant (kJ/mol/nm^2 = 20 kcal/mol/A^2)
# Ribosome excluded volume. O'Brien's default (radii 0.71 nm, eps 0.00055) is a very
# SOFT wall and lets the nascent chain penetrate the ribosome, because the topo
# rRNA bead radius (0.71 nm, a different model) is large vs cosmo's CG tunnel bore.
# Shrinking the rRNA beads lets a REAL wall fit the bore -> the chain is confined
# (penetration drops ~6x) without jamming. Tune to taste.
ribo_rna_radii      = 0.30   # rRNA bead excluded-volume radius (nm); blank -> topo 0.71
ribo_eps            = 0.2    # excluded-volume strength (kJ/mol); blank -> O'Brien's soft 0.00055

# --- integrator ---
dt         = 0.01         # time step (ps)
ref_t      = 300          # temperature (K)
tau_t      = 0.01         # Langevin friction (1/ps)
nstout     = 50           # trajectory / log / checkpoint write frequency

# --- hardware / output ---
device     = GPU          # CPU or GPU
ppn        = 2            # CPU threads (device = CPU)
outdir     = synth_out    # per-length outputs go to <outdir>/L_<L>/
