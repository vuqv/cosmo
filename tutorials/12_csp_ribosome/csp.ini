[OPTIONS]
# ---- proof-of-concept CSP run: O'Brien 3-stage synthesis of alpha-synuclein ----
# Explicit rigid ribosome scenery + per-codon 3-stage kinetics. Tiny L range and a
# small max_steps_per_stage clamp so the whole thing runs in seconds on CPU.
pdb_file  = asyn.pdb
ribosome  = ribosome_trunc.pdb
model     = mpipi
L0        = 1
L_max     = 8
outdir    = synth_out_csp

# integrator / hardware
device = CPU
ppn    = 1
dt     = 0.01
ref_t  = 300
tau_t  = 0.01
nstout = 20
minimize    = yes
tunnel_wall = yes

# O'Brien kinetics: uniform codon timing (a positive number of seconds -> no mRNA
# needed); the 3-stage split (peptidyl-transfer / translocation / tRNA-binding) and
# the seconds->steps mapping still run. max_steps_per_stage clamps the (otherwise
# ~1e6-step) production dwell down to a traceable test size.
codon_times  = 0.05
scale_factor = 216564650
time_stage_1 = 0.00034
time_stage_2 = 0.004201
random_seed  = 1
max_steps_per_stage = 1000
min_steps_per_stage = 100

# The PTC geometry is always optimized: the A/P restraint targets are placed one
# peptide bond (0.380 nm) apart, EV-clear, so each new residue is delivered with its
# peptide bond at equilibrium. (No knob -- this is the only path.)

# Post-synthesis free runs (both drop the C-terminus tether). After L_max is
# reached, 'ejection' releases the restraint so the finished chain diffuses out of
# the ribosome, then 'dissociation' lets it drift fully off into the cytosol. Set
# either to 0 to skip. Tiny here (proof of concept); use ~1e5-1e6 for real runs.
ejection_steps     = 40
dissociation_steps = 40
