[OPTIONS]
md_steps = 5000 # number of steps (short, for a demo)
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
; THE option this tutorial is about. Swap between:
;   hps_urry  - Ashbaugh-Hatch LJ, Urry hydropathy scale (default, recommended)
;   hps_kr    - Ashbaugh-Hatch LJ, Kapcha-Rossy scale (adds RNA / p-protein)
;   hps_ss    - hps_urry plus Gaussian angle + torsion bonded terms
;   mpipi     - Wang-Frenkel short-range potential instead of LJ 12-6
model = hps_urry

; temperature coupling (Langevin thermostat)
tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no
pbc = no

; input
pdb_file = asyn.pdb
; output: traj/asyn.* -- change outname when you swap model so runs don't clobber
; (e.g. outname = asyn_mpipi)
output_dir = traj
outname = asyn
; hardware
device = CPU
ppn = 1
; restart / minimize
restart = no
minimize = yes
