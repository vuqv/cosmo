[OPTIONS]
; --- Stage 1 of the slab protocol: NPT compression ---
; Start from a big box holding all chains and let an isotropic NPT barostat
; shrink it to a sensible density. (Demo length; a real run needs far more steps.)
md_steps = 1000
dt = 0.01 ; ps
nstxout = 10 ; steps between trajectory/checkpoint frames
nstlog = 10 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
model = hps_urry

; temperature coupling
tcoupl = yes
ref_t = 310 ; Kelvin
tau_t = 0.01 ; ps^-1

; pressure coupling (Monte Carlo barostat). Requires pbc = yes.
pcoupl = yes
ref_p = 1.0 ; bar
frequency_p = 25 ; barostat move attempt frequency (steps)

; periodic boundary condition
pbc = yes
; cubic starting box, large enough to contain the whole multi-chain system
box_dimension = 58.8951

; input: NON.pdb already contains many chains laid out in the box
protein_code = NON
pdb_file = NON.pdb
checkpoint = NON.chk
; slab systems are large -- a GPU is strongly recommended for real runs
device = CPU
ppn = 4
restart = no
minimize = yes
