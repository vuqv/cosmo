[OPTIONS]
# Tutorial 10: co-translational synthesis by iterative growth.
# Port of tutorials/growing_reference/ to the current cosmo codebase.
#
# The nascent chain is grown one residue at a time inside a FROZEN explicit
# ribosome; the newest residue is held at the PTC and earlier residues are walled
# forward (+x). This test uses a CONSTANT 1000 MD steps per residue -- realistic
# per-codon translation kinetics is added later (PLAN.md Phase 5), so `scale_factor`
# is intentionally absent here.
#
# Run from this folder:
#   python grow_nascent.py -f md.ini

# --- model / inputs ---
model             = hps_kr        # nascent-chain force field (HPS Kapcha-Rossky)
rib_structure     = rib.pdb       # already-cropped CG ribosome (frozen scenery)
nascent_structure = nascent.pdb   # CG (CA-only) nascent chain (sequence source)
nascent_chain_id  = 8             # chain ID for the growing nascent chain

# --- schedule (constant for this test) ---
md_steps = 1000                   # MD steps per residue (constant; codon kinetics in Phase 5)

# --- translation metadata (consumed by the Phase 5 codon scheduler; logged for now) ---
organism         = ecoli
translation_type = fast

# --- post-elongation (after the chain reaches full length) ---
# 'ejection' releases the PTC restraint so the finished chain diffuses out of the
# ribosome (ribosome stays frozen, forward wall stays on -> only +x escape);
# 'stallation' keeps it pinned. Written to <outdir>/<phase>/. Use a LONG run.
post_elongation       = ejection
post_elongation_steps = 300_000   # 0 -> skip

# --- integrator ---
dt     = 0.01     # time step (ps)
ref_t  = 310      # temperature (K)
tau_t  = 0.01     # Langevin friction (1/ps)
nstxout = 100     # trajectory / checkpoint write frequency
nstlog  = 100     # log write frequency

# --- periodic boundary (off) ---
pbc           = no
box_dimension = 30   # only used if pbc = yes

# --- output / hardware ---
outdir = synth_out
device = GPU
ppn    = 4
