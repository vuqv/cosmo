[OPTIONS]
md_steps = 5000 # number of steps (short, for a demo)
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
; select model: hps_urry (default), hps_kr, hps_ss, or mpipi
model = hps_urry

; temperature coupling (Langevin thermostat)
tcoupl = yes
ref_t = 300 ; Kelvin - reference temperature
tau_t = 0.01 ; ps^-1 - friction coefficient

; no pressure coupling for a single isolated chain
pcoupl = no

; no periodic box: one chain in vacuum-like infinite space
pbc = no

; input
protein_code = asyn
pdb_file = asyn.pdb
; output (files are written as <protein_code>.*)
checkpoint = asyn.chk
; hardware: CPU runs anywhere; switch to GPU if you have a CUDA device
device = CPU
ppn = 1
; restart / minimize
restart = no
minimize = yes ; relax the input coordinates before stepping
