[OPTIONS]
# ---- CSP on an explicit coarse-grained ribosome: O'Brien 3-stage synthesis ----
# alpha-synuclein (140-res IDP nascent chain) grown N->C on the *E. coli* ribosome,
# cosmo IDP force field (hps_urry). This is the tutorial-scaled version of the
# production run in `sandbox/Ecoli/` (csp_val.ini): identical ribosome, mRNA and
# O'Brien codon kinetics, but a short L range + step clamps + CPU so the whole thing
# runs in seconds. See the README for the full production values.

pdb_file = asyn.pdb
# E. coli 50S ribosome, 4V9D (with the 5JTE A-site tRNA grafted in), coarse-grained
# to the O'Brien 3/4-bead P/R/BR rRNA representation (4576 beads). Rigid mass-0
# scenery: it supplies the ribosome<->nascent 12-10-6 excluded volume + Yukawa.
ribosome = 4v9d_50S_PtR_5jte_AtR_model_cg_trunc.pdb
model    = hps_urry

L0     = 1
L_max  = 8           # tutorial: first 8 residues only (production: unset = full 140)
outdir = synth_out_csp

# integrator / hardware (tutorial: CPU; production Ecoli uses device = GPU, ppn = 4)
device = CPU
ppn    = 1
dt     = 0.01        # ps (flexible harmonic bonds; no AllBonds constraints)
ref_t  = 310         # K (E. coli growth temperature)
tau_t  = 0.05
nstout = 20
minimize    = yes
tunnel_wall = yes

# O'Brien per-codon kinetics -- the real E. coli 310 K codon table + demo mRNA. The
# per-residue mean time is read from `trans_times.txt` (keyed by codon), split into
# the 3 sub-stages (peptidyl-transfer / translocation / tRNA-binding) and mapped to
# steps via scale_factor. Values below are identical to sandbox/Ecoli/csp_val.ini.
mrna         = mrna.txt
codon_times  = trans_times.txt
scale_factor = 4331293
time_stage_1 = 0.000340
time_stage_2 = 0.004201
random_seed  = 20240629

# Tutorial clamp: cap each stage's (otherwise ~1e6-step production) dwell down to a
# traceable size. Remove both clamps for a real run (see sandbox/Ecoli/).
max_steps_per_stage = 1000
min_steps_per_stage = 100

# The PTC geometry is always optimized: the A/P restraint targets are placed one
# peptide bond (0.380 nm) apart, EV-clear, so each new residue is delivered with its
# peptide bond at equilibrium. (No knob -- this is the only path.)

# Post-synthesis free runs (both drop the C-terminus tether). 'ejection' releases the
# restraint so the finished chain diffuses out of the ribosome; 'dissociation' lets
# it drift off. Tiny here (proof of concept); production Ecoli uses ejection_steps =
# 10_000_000. Set either to 0 to skip.
ejection_steps     = 40
dissociation_steps = 0
