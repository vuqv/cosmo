[OPTIONS]
# Co-translational synthesis with the COSMO (IDP) RNA ribosome representation,
# using the FULL Ashbaugh-Hatch HPS potential for the ribosome.
#
# Like tutorials/07_translation, the ribosome rRNA is one bead per nucleotide
# (rna_model = cosmo). The difference here is the ribosome<->nascent interaction:
# the ribosome participates in the **full Ashbaugh-Hatch HPS** (ribo_full_hps = yes)
# -- a hard, full-size wall with real per-bead sigma/hydropathy (ε = 0.8368 kJ/mol)
# -- instead of the soft, separate excluded-volume wall. This needs a model that
# parameterises BOTH protein and RNA, hence model = hps_kr (hps_urry has no RNA).
# A hard wall gives real radial confinement, so the chain should stay extended and
# extrude rather than collapse into a globule at the PTC.
#
# Run from this folder:
#   cosmo-elongate -f elongate.ini

# --- inputs (paths relative to the working directory) ---
pdb_file   = asyn.pdb                                                            # full native PDB of the nascent chain
ribosome   = ../../cosmo/translation/structures/4v9d_50S_PtR_5jte_AtR_model_cg_cosmo_trunc.pdb  # cosmo 1-bead/nt CG ribosome

# --- elongation schedule ---
L0         = 5            # starting nascent-chain length (cold-start layout)
L_max      =             # final length (blank -> full residue count)
model      = hps_kr       # nascent-chain force field (parameterises protein AND RNA)
n_steps    = 2_000        # integration steps per residue

# --- mechanics ---
restraint_k = 83680       # C-terminus -> P-anchor restraint (kJ/mol/nm^2)
buffer      = 0.4         # new-residue placement offset beyond the A-anchor (nm; v1 only)
ptc_offset  =            # blank -> auto (0 in v1, 0.4 in v2)
minimize    = yes

# --- integrator ---
dt         = 0.01
ref_t      = 300
tau_t      = 0.01
nstout     = 50

# --- build step v2: rigid ribosome (COSMO RNA representation) ---
rigid_ribosome      = yes
rna_model           = cosmo  # <-- the only change vs tutorial 07: cosmo 1-bead/nt rRNA
nascent_only_output = yes
trna_tether         = yes
tunnel_wall         = yes
tunnel_wall_x0      =        # blank -> auto = P-anchor x + tether bond length
tunnel_wall_k       = 8368
ribo_full_hps       = yes    # ribosome uses the FULL Ashbaugh-Hatch HPS (hard wall + hydropathy)
# ribo_rna_radii / ribo_eps are IGNORED when ribo_full_hps = yes (they tune the soft
# excluded-volume wall, which is not used in full-HPS mode):
# ribo_rna_radii    = 0.50
# ribo_eps          = 0.2

# --- hardware / output ---
device     = GPU
ppn        = 2
outdir     = synth_out
