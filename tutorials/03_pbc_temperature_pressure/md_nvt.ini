[OPTIONS]
md_steps = 5000 # number of steps (short, for a demo)
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
model = hps_urry

; NVT ensemble: temperature coupling on, pressure coupling off
tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

pcoupl = no

; periodic boundary condition: chain lives in a cubic box
pbc = yes
; box_dimension = L (cubic) or [x, y, z] in nm
box_dimension = 30

; input
pdb_file = asyn.pdb
; output: traj/asyn_nvt.*
output_dir = traj
outname = asyn_nvt
; hardware
device = CPU
ppn = 1
; restart / minimize
restart = no
minimize = yes
