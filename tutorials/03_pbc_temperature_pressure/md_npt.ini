[OPTIONS]
md_steps = 5000 # number of steps (short, for a demo)
dt = 0.01 ; time step in ps
nstxout = 100 ; steps between trajectory/checkpoint frames
nstlog = 100 ; steps between log lines
nstcomm = 100 ; frequency for center-of-mass motion removal
model = hps_urry

; NPT ensemble: temperature coupling on ...
tcoupl = yes
ref_t = 300 ; Kelvin
tau_t = 0.01 ; ps^-1

; ... and pressure coupling on (a Monte Carlo barostat is added automatically).
; pcoupl = yes REQUIRES pbc = yes.
pcoupl = yes
ref_p = 1.0 ; bar - target pressure
frequency_p = 25 ; barostat move attempt frequency (steps)

; periodic boundary condition (required for a barostat)
pbc = yes
box_dimension = 30

; input
pdb_file = asyn.pdb
; output: traj/asyn_npt.*
output_dir = traj
outname = asyn_npt
; hardware
device = CPU
ppn = 1
; restart / minimize
restart = no
minimize = yes
