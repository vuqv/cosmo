[OPTIONS]
md_steps = 1_000 # number of steps
dt = 0.01 ; ps
nstxout = 10 ; number of steps to write checkpoint/trajectory
nstlog = 10 ; number of steps to print log
nstcomm = 100 ; frequency for center of mass motion removal
; select model, available options: hps_kr, hps_urry, hps_ss, mpipi
model = hps_urry

; control temperature coupling
tcoupl = yes
ref_t = 310 ; Kelvin
tau_t = 0.01 ; ps^-1

; pressure coupling (NPT slab run). Requires pbc = yes.
pcoupl = yes
ref_p = 1.0 ; bar
frequency_p = 25 ; Monte Carlo barostat coupling frequency

; periodic boundary condition
pbc = yes
; box_dimension = x or [x, y, z], unit of nanometer
box_dimension = 58.8951

; input
protein_code = NON
pdb_file = NON.pdb
; output
checkpoint = NON.chk
; use GPU/CPU
device = GPU
; if CPU is specified, then use ppn
ppn = 4
; restart simulation
restart = no
minimize = yes ; if not restart, then minimize will be loaded, otherwise minimize=False
