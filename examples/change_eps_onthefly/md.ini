[OPTIONS]
md_steps = 1 # number of steps
dt = 0.01 ; ps
nstxout = 1 ; number of steps to write checkpoint/trajectory
nstlog = 1 ; number of steps to print log
; LJ energy scale for monomer-monomer interaction (Ashbaugh-Hatch global epsilon)
LJ_eps = 1.8368 ; kJ/mol  -- consumed by this example's run_simulation.py
; select model, available options: hps_kr, hps_urry, hps_ss
model = hps_urry

; control temperature coupling
tcoupl = yes
ref_t = 310 ; Kelvin
tau_t = 0.01 ; ps^-1

; periodic boundary condition
pbc = no
; box_dimension = x or [x, y, z], unit of nanometer
box_dimension = 30

; input
protein_code = asyn
pdb_file = asyn.pdb
; output
checkpoint = asyn.chk
; use GPU/CPU
device = GPU
; if CPU is specified, then use ppn
ppn = 4
; restart simulation
restart = no
minimize = no ; if not restart, then minimize will be loaded, otherwise minimize=False
