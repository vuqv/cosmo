<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 492 132" role="img" aria-label="cosmo">
  <title>cosmo</title>
  <style>
    .ink { fill: none; stroke: #16202b; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
    @media (prefers-color-scheme: dark) { .ink { stroke: #e8eef4; } }
  </style>

  <!-- bead-chain mark, left -->
  <g transform="translate(8,16)">
    <defs>
      <linearGradient id="wmSeq" x1="24" y1="30" x2="76" y2="70" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#0e8f86"/><stop offset="1" stop-color="#d9891f"/>
      </linearGradient>
    </defs>
    <rect x="12" y="12" width="76" height="76" rx="16" fill="none" stroke="#0e8f86" stroke-width="4.5"/>
    <polyline points="27,60 30,44 40,35 51,31 58,41 51,53 43,64 56,68 68,61 73,46"
              fill="none" stroke="#0e8f86" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="url(#wmSeq)">
      <circle cx="27" cy="60" r="5"/><circle cx="30" cy="44" r="5"/><circle cx="40" cy="35" r="5"/>
      <circle cx="51" cy="31" r="5"/><circle cx="58" cy="41" r="5"/><circle cx="51" cy="53" r="5"/>
      <circle cx="43" cy="64" r="5"/><circle cx="56" cy="68" r="5"/><circle cx="68" cy="61" r="5"/>
      <circle cx="73" cy="46" r="5"/>
    </g>
  </g>

  <!-- geometric monoline "cosmo", right. o's tinted teal to echo the beads. -->
  <!-- c -->
  <path class="ink" d="M180 46.6 A28 28 0 1 0 180 89.4"/>
  <!-- o -->
  <circle cx="232" cy="68" r="28" fill="none" stroke="#0e8f86" stroke-width="12"/>
  <!-- s -->
  <path class="ink" d="M316 52 C314 40 282 40 282 55 C282 68 314 68 314 81 C314 96 282 96 280 84"/>
  <!-- m -->
  <path class="ink" d="M340 96 L340 64 Q340 50 356 50 Q372 50 372 64 L372 96 M372 64 Q372 50 388 50 Q404 50 404 64 L404 96"/>
  <!-- o -->
  <circle cx="452" cy="68" r="28" fill="none" stroke="#0e8f86" stroke-width="12"/>
</svg>
