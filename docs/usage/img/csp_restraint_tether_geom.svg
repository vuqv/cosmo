<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" role="img"
     aria-label="The nascent C-terminus is bonded to the ribose of the tRNA 3-prime adenosine A76, with two orienting angles and an improper dihedral to the phosphate and base beads.">
  <title>CSP tRNA tether geometry to A76 (trna_tether = yes)</title>
  <style>
    :root{
      --ink:#1b1e26; --muted:#5f6675; --faint:#8b91a0; --line:#d7dbe3;
      --nasc:#4b57a6; --trna:#1f9488; --bond:#c26a25; --angle:#8a7fc4;
      --wedge:rgba(138,127,196,.20);
    }
    @media (prefers-color-scheme:dark){:root{
      --ink:#eef0f5; --muted:#9aa0b0; --faint:#6c7382; --line:#2c313d;
      --nasc:#8590de; --trna:#3fb9ab; --bond:#e0964a; --angle:#a99fe0;
      --wedge:rgba(169,159,224,.24);
    }}
    text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
    .lbl{fill:var(--ink);font-size:14px;font-weight:600}
    .sub{fill:var(--muted);font-size:11.5px}
    .val{fill:var(--angle);font-size:12px;font-weight:600;font-family:ui-monospace,monospace}
    .bondlbl{fill:var(--bond);font-size:12px;font-weight:600;font-family:ui-monospace,monospace}
    .beadN{fill:var(--nasc)} .beadT{fill:var(--trna)} .fw{fill:var(--wedge)}
  </style>

  <line x1="60" y1="70" x2="150" y2="112" style="stroke:var(--line)" stroke-width="3"/>
  <line x1="150" y1="112" x2="240" y2="176" style="stroke:var(--nasc)" stroke-width="3"/>
  <line x1="360" y1="216" x2="452" y2="166" style="stroke:var(--trna)" stroke-width="2.4"/>
  <line x1="360" y1="216" x2="446" y2="306" style="stroke:var(--trna)" stroke-width="2.4"/>
  <path d="M360,216 L327,205 L389,200 Z" class="fw"/>
  <path d="M360,216 L327,205 L385,240 Z" class="fw"/>
  <path d="M240,176 L214,158 L270,187 Z" class="fw"/>
  <line x1="240" y1="176" x2="360" y2="216" style="stroke:var(--bond)" stroke-width="4.4" stroke-linecap="round"/>
  <path d="M240,176 L360,216 L452,166 L446,306 Z" fill="none" style="stroke:var(--angle)" stroke-width="1.3" stroke-dasharray="4 4" opacity=".55"/>
  <circle cx="60" cy="70" r="10" class="beadN"/>
  <circle cx="150" cy="112" r="13" class="beadN"/>
  <circle cx="240" cy="176" r="15" class="beadN"/>
  <circle cx="360" cy="216" r="15" class="beadT"/>
  <circle cx="452" cy="166" r="13" class="beadT"/>
  <circle cx="446" cy="306" r="13" class="beadT"/>
  <text class="sub" x="44" y="54">…nascent chain</text>
  <text class="lbl" x="150" y="104" text-anchor="middle" dy="-6">L−1</text>
  <text class="sub" x="150" y="134">prev</text>
  <text class="lbl" x="228" y="176" text-anchor="end" dx="-4">N</text>
  <text class="sub" x="214" y="196" text-anchor="middle">C-term (res L)</text>
  <text class="lbl" x="360" y="216" text-anchor="middle" dy="5" style="fill:#fff">R</text>
  <text class="sub" x="360" y="245" text-anchor="middle">ribose</text>
  <text class="lbl" x="470" y="164">P</text>
  <text class="sub" x="470" y="178">phosphate</text>
  <text class="lbl" x="462" y="305">BR2</text>
  <text class="sub" x="462" y="319">base</text>
  <text class="bondlbl" x="292" y="188">bond 0.476 nm</text>
  <text class="val" x="352" y="182" text-anchor="middle">117°</text>
  <text class="val" x="349" y="243" text-anchor="middle">130°</text>
  <text class="val" x="224" y="150" text-anchor="middle">θ</text>
  <text class="val" x="404" y="250" text-anchor="middle" opacity=".9">improper −161°</text>
  <path d="M330,340 q0,8 8,8 h96 q8,0 8,-8" fill="none" style="stroke:var(--faint)" stroke-width="1.2"/>
  <text class="sub" x="386" y="368" text-anchor="middle">tRNA residue 76 — the 3′-terminal adenosine (A76)</text>
</svg>
