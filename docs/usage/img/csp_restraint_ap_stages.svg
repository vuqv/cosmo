<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" role="img"
     aria-label="tRNA sites drawn E, P, A left to right. Across the three stages the new residue moves from the A-site to the P-site, right to left.">
  <title>CSP A→P switch across the three stages (E–P–A convention)</title>
  <style>
    :root{
      --ink:#1b1e26; --muted:#5f6675; --faint:#8b91a0; --hair:#e7eaf0;
      --nasc:#4b57a6; --trna:#1f9488; --bond:#c26a25; --angle:#8a7fc4;
    }
    @media (prefers-color-scheme:dark){:root{
      --ink:#eef0f5; --muted:#9aa0b0; --faint:#6c7382; --hair:#2f3542;
      --nasc:#8590de; --trna:#3fb9ab; --bond:#e0964a; --angle:#a99fe0;
    }}
    text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
    .lbl{fill:var(--ink);font-size:14px;font-weight:600}
    .site{fill:var(--ink);font-size:15px;font-weight:700}
    .sub{fill:var(--muted);font-size:11.5px}
    .val{fill:var(--angle);font-size:12px;font-weight:600;font-family:ui-monospace,monospace}
    .beadN{fill:var(--nasc)} .beadT{fill:var(--trna)}
  </style>
  <defs>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" style="fill:var(--bond)"/></marker>
  </defs>

  <g style="stroke:var(--hair)" stroke-width="1">
    <line x1="170" y1="58" x2="170" y2="312"/><line x1="310" y1="58" x2="310" y2="312"/><line x1="450" y1="58" x2="450" y2="312"/>
  </g>
  <text class="site" x="170" y="30" text-anchor="middle" opacity=".5">E</text>
  <text class="site" x="310" y="30" text-anchor="middle">P</text>
  <text class="site" x="450" y="30" text-anchor="middle">A</text>
  <text class="sub" x="170" y="44" text-anchor="middle" opacity=".55">exit · no tRNA</text>
  <text class="sub" x="310" y="44" text-anchor="middle">peptidyl</text>
  <text class="sub" x="450" y="44" text-anchor="middle">aminoacyl · incoming</text>

  <!-- STAGE 1 -->
  <text class="lbl" x="18" y="104">stage 1</text><text class="sub" x="18" y="120">peptidyl transfer</text>
  <circle cx="170" cy="108" r="11" fill="none" style="stroke:var(--faint)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <circle cx="310" cy="92" r="11" class="beadT"/><circle cx="310" cy="126" r="11" class="beadN"/>
  <line x1="310" y1="103" x2="310" y2="115" style="stroke:var(--bond)" stroke-width="3.6"/>
  <text class="sub" x="332" y="130">prev</text>
  <circle cx="450" cy="92" r="11" class="beadT"/><circle cx="450" cy="126" r="12" class="beadN"/>
  <text class="lbl" x="450" y="130" text-anchor="middle" style="fill:#fff" font-size="11">N</text>
  <line x1="450" y1="103" x2="450" y2="114" style="stroke:var(--bond)" stroke-width="3.6"/>

  <line x1="60" y1="150" x2="520" y2="150" style="stroke:var(--hair)" stroke-width="1"/>

  <!-- STAGE 2 -->
  <text class="lbl" x="18" y="186">stage 2</text><text class="sub" x="18" y="202">translocation onset</text>
  <circle cx="170" cy="190" r="11" fill="none" style="stroke:var(--faint)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <circle cx="310" cy="174" r="11" class="beadT" opacity=".45"/>
  <circle cx="310" cy="208" r="11" class="beadN" opacity=".85"/><text class="sub" x="332" y="212">prev · free</text>
  <circle cx="450" cy="174" r="11" class="beadT"/><circle cx="450" cy="208" r="12" class="beadN"/>
  <text class="lbl" x="450" y="212" text-anchor="middle" style="fill:#fff" font-size="11">N</text>
  <line x1="450" y1="185" x2="450" y2="196" style="stroke:var(--bond)" stroke-width="3.6"/>

  <line x1="60" y1="232" x2="520" y2="232" style="stroke:var(--hair)" stroke-width="1"/>

  <!-- STAGE 3 -->
  <text class="lbl" x="18" y="268">stage 3</text><text class="sub" x="18" y="284">translocation → P</text>
  <circle cx="170" cy="272" r="11" fill="none" style="stroke:var(--faint)" stroke-width="1.4" stroke-dasharray="3 3"/>
  <circle cx="310" cy="256" r="11" class="beadT"/><circle cx="310" cy="290" r="12" class="beadN"/>
  <text class="lbl" x="310" y="294" text-anchor="middle" style="fill:#fff" font-size="11">N</text>
  <line x1="310" y1="267" x2="310" y2="278" style="stroke:var(--bond)" stroke-width="3.6"/>
  <circle cx="450" cy="256" r="11" class="beadT" opacity=".4"/><circle cx="450" cy="290" r="12" class="beadN" opacity=".22"/>
  <path d="M432,262 C388,252 356,254 328,262" fill="none" style="stroke:var(--bond)" stroke-width="2.2" stroke-dasharray="5 4" marker-end="url(#arr2)"/>
  <text class="val" x="378" y="248" text-anchor="middle" style="fill:var(--bond)">re-tether A→P</text>
</svg>
